name: Serebii Monitor

on:
  schedule:
    - cron: '0 * * * *' # 매시간 정각마다 실행
  workflow_dispatch: # 수동 실행 버튼

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 필요 라이브러리 설치 (스크랩 & 번역)
        run: |
          pip install beautifulsoup4 deep-translator

      - name: 스크립트 실행
        run: python check_site.py

      - name: 변경된 지문 저장하기
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_hash.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Serebii hash" && git push)
